version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      # icons-material majors track @mui/material majors, and Material is
      # pinned to 6.x until Joy UI ships against the v7+/v9 core (or we
      # migrate off Joy). See #878; doomed bump attempt: #824.
      - dependency-name: "@mui/icons-material"
        update-types: ["version-update:semver-major"]
    groups:
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      wxyc-shared:
        patterns:
          - "@wxyc/shared"
      runtime-adapter:
        patterns:
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "better-auth"
          - "@better-auth/*"
          - "@wxyc/shared"
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "better-auth"
          - "@better-auth/*"
          - "@wxyc/shared"
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
