version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      wxyc-shared:
        patterns:
          - "@wxyc/shared"
      runtime-adapter:
        patterns:
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "better-auth"
          - "@better-auth/*"
          - "@wxyc/shared"
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "better-auth"
          - "@better-auth/*"
          - "@wxyc/shared"
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
    ignore:
      # The Cloudflare Pages Git build compiles the worker with a pinned wrangler
      # 3.114.17, which miscompiles @opennextjs/cloudflare >= 1.19 into a boot 500
      # (opennextjs/opennextjs-cloudflare#1286; confirmed again on dj-site PR #790).
      # The known-good adapter is 1.14.x, and 1.14.x cannot build next >= 16.2
      # (loadManifest prefetch-hints crash), so hold both.
      #
      # DO NOT drop these in the Direct-Upload migration PR itself: while the CF
      # Pages Git build is still enabled, a Dependabot OpenNext >= 1.19 bump would
      # pass the (wrangler-4) CI preview smoke but 500 production via the still-
      # active wrangler-3 Git build. Remove this block only AFTER the Git build is
      # disabled — the final step of the WXYC/dj-site#810 cutover runbook
      # (docs/deploy-cutover-runbook.md).
      - dependency-name: "@opennextjs/cloudflare"
        versions: [">=1.15.0"]
      - dependency-name: "next"
        versions: [">=16.2.0"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
