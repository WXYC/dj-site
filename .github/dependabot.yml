version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      better-auth:
        patterns:
          - "better-auth"
          - "@better-auth/*"
      wxyc-shared:
        patterns:
          - "@wxyc/shared"
      runtime-adapter:
        patterns:
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "better-auth"
          - "@better-auth/*"
          - "@wxyc/shared"
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
        exclude-patterns:
          - "better-auth"
          - "@better-auth/*"
          - "@wxyc/shared"
          - "next"
          - "@opennextjs/cloudflare"
          - "wrangler"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
