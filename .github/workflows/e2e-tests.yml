name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      backend_ref:
        description: 'Backend-Service branch/tag to use'
        required: false
        default: 'main'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  # Frontend configuration
  NEXT_PUBLIC_BACKEND_URL: http://localhost:8085
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:8084/auth
  NEXT_PUBLIC_DASHBOARD_HOME_PAGE: /dashboard/flowsheet
  NEXT_PUBLIC_VERSION: e2e
  NEXT_PUBLIC_DEFAULT_EXPERIENCE: modern
  NEXT_PUBLIC_ENABLED_EXPERIENCES: modern,classic
  NEXT_PUBLIC_ALLOW_EXPERIENCE_SWITCHING: "true"
  NEXT_PUBLIC_CATALOG_TRACK_SEARCH_UI_ENABLED: "true"
  NEXT_PUBLIC_FLOWSHEET_SSE_DASHBOARD_ENABLED: "true"
  NEXT_PUBLIC_FLOWSHEET_SSE_LIVE_VIEW_ENABLED: "true"
  # Build-time gate for the RFC 8628 QR sign-in method. Inlined into the
  # dj-site build, so it must be present here (the build-cache key hashes this
  # workflow file, so flipping it auto-invalidates the stale .next/ cache).
  # Required by e2e/tests/auth/qr-signin.spec.ts — without it the "Sign in with
  # a QR code" entry link never renders and the spec can't reach the QR stage.
  NEXT_PUBLIC_QR_LOGIN_ENABLED: "true"
  NEXT_PUBLIC_ONBOARDING_TEMP_PASSWORD: temppass123
  NEXT_PUBLIC_APP_ORGANIZATION: test-org
  SESSION_SECRET: e2e-secret-for-testing
  APP_ORGANIZATION_ID: test-org-id-0000000000000000001
  # E2E test config
  E2E_BASE_URL: http://localhost:3000
  # Backend service ports
  E2E_DB_PORT: 5434
  E2E_AUTH_PORT: 8084
  E2E_BACKEND_PORT: 8085
  # Postgres connection for the SSE E2E suite (e2e/helpers/pg-notify.ts).
  # Mirrors scripts/e2e-local.sh's exports and the postgres service config
  # above. Backend-Service's own .env (sourced inside the Backend track)
  # takes precedence in that subshell, so this only affects steps that
  # need direct DB access from the test runner.
  DB_HOST: localhost
  DB_PORT: "5434"
  DB_NAME: wxyc_db
  DB_USERNAME: wxyc_admin
  DB_PASSWORD: 'RadioIsEpic$1100'

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
# packages:read is required to install Backend-Service@main, which pulls
# @wxyc/shared from npm.pkg.github.com during npm ci (see charset-corpus-drift.yml).
permissions:
  contents: read
  packages: read

jobs:
  # See ci.yml for the rationale on the changes-job pattern (issue #731).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app_source: ${{ steps.filter.outputs.app_source }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7

      - name: Filter
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app_source:
              - 'app/**'
              - 'src/**'
              - 'lib/features/**'
              - 'lib/store.ts'
              - 'lib/hooks.ts'
              - 'e2e/**'
              - 'package.json'
              - 'package-lock.json'
              - 'next.config.*'
              - 'playwright.config.*'
              - '.github/workflows/e2e-tests.yml'

  e2e:
    name: E2E Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.app_source == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:18.0-alpine
        env:
          POSTGRES_PASSWORD: 'RadioIsEpic$1100'
          POSTGRES_USER: wxyc_admin
          POSTGRES_DB: wxyc_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U wxyc_admin -d wxyc_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout dj-site
        uses: actions/checkout@v7
        with:
          path: dj-site

      - name: Checkout Backend-Service
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository_owner }}/Backend-Service
          ref: ${{ github.event.inputs.backend_ref || 'main' }}
          path: Backend-Service
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            dj-site/package-lock.json
            Backend-Service/package-lock.json

      - name: Create Backend .env file
        working-directory: Backend-Service
        run: |
          cat > .env << 'EOF'
          DB_HOST=localhost
          DB_PORT=5434
          DB_NAME=wxyc_db
          DB_USERNAME=wxyc_admin
          DB_PASSWORD='RadioIsEpic$1100'
          BETTER_AUTH_SECRET=e2e-auth-secret-for-testing-min-32-chars
          BETTER_AUTH_URL=http://localhost:8084/auth
          BETTER_AUTH_JWKS_URL=http://localhost:8084/auth/jwks
          BETTER_AUTH_TRUSTED_ORIGINS=http://localhost:3000,http://localhost:3001
          FRONTEND_SOURCE=http://localhost:3000
          DEFAULT_ORG_SLUG=test-org
          DEFAULT_ORG_NAME='Test Organization'
          APP_ORGANIZATION_ID=test-org-id-0000000000000000001
          E2E_DB_PORT=5434
          E2E_AUTH_PORT=8084
          E2E_BACKEND_PORT=8085
          COOKIE_SAME_SITE=lax
          NODE_ENV=test
          # Mirror target: localhost mock that returns 200 to every POST,
          # short-circuiting the 15.5s exponential-backoff retry storm that
          # the default (https://www.wxyc.info, currently cert-expired) would
          # produce. Mock is started in the next workflow step. See #567.
          TUBAFRENZY_URL=http://localhost:9091
          MIRROR_API_KEY=e2e-mirror-noop-key
          # CDC LISTEN is gated on CDC_SECRET in setupCdcWebSocket(). The
          # SSE Tier 1 metadata-broadcast handler (setupMetadataBroadcast)
          # registers on the same LISTEN — so without this, pg_notify is
          # silently dropped. Tracked as a Backend-Service follow-up.
          CDC_SECRET=e2e-cdc-secret-not-used-by-tests
          # Tier 3 refetch test triggers liveFs:refetch by posting to
          # POST /internal/flowsheet-sync-notify with X-Internal-Key.
          ETL_NOTIFY_KEY=e2e-etl-notify-key
          EOF

      - name: Start mock tubafrenzy mirror
        working-directory: dj-site
        run: |
          node e2e/scripts/mock-tubafrenzy.mjs > /tmp/mock-tubafrenzy.log 2>&1 &
          echo $! > /tmp/mock-tubafrenzy.pid
          # Wait for the mock to bind before any later step expects it to
          # answer. ~50ms in practice; cap at 5s as a safety net.
          timeout 5 bash -c 'until curl -sf -X POST -H "Content-Type: application/json" --data "{}" http://localhost:9091/ >/dev/null; do sleep 0.1; done'
          echo "Mock tubafrenzy ready"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('dj-site/package-lock.json') }}

      - name: Install dependencies
        env:
          # GITHUB_TOKEN + packages:read installs @wxyc/shared from GitHub
          # Packages on same-repo workflows. Fork-originated PRs cannot access
          # repo secrets at all — this swap does not change that; it matches
          # charset-corpus-drift.yml for in-repo PR/push runs.
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          (cd Backend-Service && npm ci) &
          PID_BS=$!
          (cd dj-site && npm ci) &
          PID_DJ=$!
          wait $PID_BS || exit 1
          wait $PID_DJ || exit 1

      - name: Cache dj-site build
        id: nextjs-build-cache
        uses: actions/cache@v6
        with:
          path: dj-site/.next
          # Workflow file hash is included because the env block (NEXT_PUBLIC_*)
          # is inlined into the Next.js build; flipping a flag without invalidating
          # the cache would silently serve a stale build.
          key: e2e-nextjs-${{ hashFiles('dj-site/package-lock.json') }}-${{ hashFiles('dj-site/next.config.*') }}-${{ hashFiles('dj-site/.github/workflows/e2e-tests.yml') }}-${{ hashFiles('dj-site/app/**', 'dj-site/src/**', 'dj-site/lib/**') }}
          restore-keys: |
            e2e-nextjs-${{ hashFiles('dj-site/package-lock.json') }}-${{ hashFiles('dj-site/next.config.*') }}-${{ hashFiles('dj-site/.github/workflows/e2e-tests.yml') }}-
            e2e-nextjs-${{ hashFiles('dj-site/package-lock.json') }}-${{ hashFiles('dj-site/next.config.*') }}-
            e2e-nextjs-${{ hashFiles('dj-site/package-lock.json') }}-

      - name: Build and start services
        env:
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXTJS_BUILD_CACHE_HIT: ${{ steps.nextjs-build-cache.outputs.cache-hit }}
          PLAYWRIGHT_CACHE_HIT: ${{ steps.playwright-cache.outputs.cache-hit }}
        run: |
          # Backend track: build -> init-db -> start services -> seed users
          (
            cd Backend-Service

            # Export all .env vars so they're available at module-import time
            # (shared/authentication checks BETTER_AUTH_JWKS_URL before dotenv loads)
            set -a; source .env; set +a

            npm run build
            node dev_env/init-db.mjs

            # Start auth service
            AUTH_PORT=8084 node apps/auth/dist/app.js > /tmp/auth.log 2>&1 &
            echo $! > /tmp/auth.pid
            echo "Waiting for auth service..."
            timeout 60 bash -c 'until curl -sf http://localhost:8084/healthcheck; do sleep 1; done'

            # Start backend service (PORT and auth issuer/audience not in .env)
            PORT=8085 \
            BETTER_AUTH_ISSUER=http://localhost:8084 \
            BETTER_AUTH_AUDIENCE=http://localhost:8084 \
            node apps/backend/dist/app.js > /tmp/backend.log 2>&1 &
            echo $! > /tmp/backend.pid
            echo "Waiting for backend service..."
            timeout 60 bash -c 'until curl -sf http://localhost:8085/healthcheck; do sleep 1; done'

            # Seed E2E test users
            npm run setup:e2e-users
          ) &
          PID_BACKEND=$!

          # Playwright track: skip install if browser binary is already cached.
          # On cache hit the binary exists at ~/.cache/ms-playwright. The --with-deps
          # flag installs system fonts via apt-get (~25s); ubuntu-latest already has
          # the critical system libraries Chromium needs (libX11, libnss3, etc.).
          if [ "$PLAYWRIGHT_CACHE_HIT" = "true" ]; then
            echo "Playwright browser cache hit — skipping install"
          else
            (cd dj-site && npx playwright install --with-deps chromium) &
            PID_PW=$!
          fi

          # dj-site build track: skip if exact cache hit on .next/
          if [ "$NEXTJS_BUILD_CACHE_HIT" = "true" ]; then
            echo "dj-site build cache hit — skipping build"
          else
            (cd dj-site && npm run build) &
            PID_BUILD=$!
          fi

          # Wait for parallel tracks — fail if any fails
          wait $PID_BACKEND || exit 1
          if [ -n "$PID_PW" ]; then wait $PID_PW || exit 1; fi
          if [ -n "$PID_BUILD" ]; then wait $PID_BUILD || exit 1; fi

          # Second dj-site build for e2e/tests/auth/server-session-via-docker.spec.ts.
          # NEXT_PUBLIC_BETTER_AUTH_URL is inlined at build time to an unreachable
          # loopback address, simulating the Docker scenario where the container's
          # `localhost` is the container itself. AUTH_REWRITE_URL is set at runtime
          # on the second `npm run start` (in the Start dj-site step) and is what
          # the test asserts gets picked up. Writes to `.next-broken-auth/` via
          # NEXT_DIST_DIR_SUFFIX in next.config.mjs so the primary `.next/` cache
          # survives. Runs AFTER the primary build, not in parallel: both builds
          # bootstrap OpenNext (initOpenNextCloudflareForDev in next.config.mjs)
          # against a shared workerd SQLite cache and both trigger Next's
          # tsconfig.json typegen rewrite — running them concurrently races on
          # those shared files and crashes with SQLITE_BUSY. Not cached
          # separately to keep cache-key logic simple.
          (cd dj-site && \
            NEXT_PUBLIC_BETTER_AUTH_URL=http://127.0.0.99:9999/auth \
            NEXT_DIST_DIR_SUFFIX=broken-auth \
            npm run build) || exit 1

      - name: Start dj-site
        working-directory: dj-site
        run: |
          npm run start > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid

          # Wait for frontend to be ready
          echo "Waiting for frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

          # Second dj-site instance for the server-session-via-docker test
          # (built earlier with NEXT_PUBLIC_BETTER_AUTH_URL pointing at an
          # unreachable host). NEXT_DIST_DIR_SUFFIX=broken-auth selects the
          # `.next-broken-auth/` build at runtime. AUTH_REWRITE_URL points at
          # the real auth so it wins over the unreachable build-inlined
          # NEXT_PUBLIC_BETTER_AUTH_URL in both getBaseURL() and the /auth
          # route handler — the precedence the test asserts.
          PORT=3001 \
            NEXT_DIST_DIR_SUFFIX=broken-auth \
            AUTH_REWRITE_URL=http://localhost:8084/auth \
            npm run start \
            > /tmp/frontend-broken-auth.log 2>&1 &
          echo $! > /tmp/frontend-broken-auth.pid
          echo "Waiting for second frontend..."
          timeout 60 bash -c 'until curl -sf http://localhost:3001; do sleep 2; done'

      - name: Run E2E tests
        working-directory: dj-site
        env:
          SECOND_FRONTEND_PORT: "3001"
          # Tier 3 refetch test posts directly to BS's internal route.
          E2E_BACKEND_URL: "http://localhost:8085"
          ETL_NOTIFY_KEY: "e2e-etl-notify-key"
        # --max-failures kept at 10 per shard: with sharding, a stuck shard
        # hits its cap on its own, so dropping to 1 tanks otherwise-green
        # shards (see prior commit on #574).
        run: |
          npm run test:e2e -- \
            "--shard=${{ matrix.shard }}/${{ strategy.job-total }}" \
            "--max-failures=10" \
            "--reporter=html" \
            "--reporter=github"

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "=== Auth Service Logs ==="
          cat /tmp/auth.log 2>/dev/null || echo "No auth log"
          echo ""
          echo "=== Backend Service Logs ==="
          cat /tmp/backend.log 2>/dev/null || echo "No backend log"
          echo ""
          echo "=== Frontend Logs ==="
          cat /tmp/frontend.log 2>/dev/null || echo "No frontend log"
          echo ""
          echo "=== Frontend (broken-auth) Logs ==="
          cat /tmp/frontend-broken-auth.log 2>/dev/null || echo "No frontend-broken-auth log"
          echo ""
          echo "=== Mock Tubafrenzy Logs ==="
          cat /tmp/mock-tubafrenzy.log 2>/dev/null || echo "No mock-tubafrenzy log"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: dj-site/playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-shard-${{ matrix.shard }}
          path: dj-site/test-results/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          kill $(cat /tmp/frontend.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/frontend-broken-auth.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/auth.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/backend.pid 2>/dev/null) 2>/dev/null || true
          kill $(cat /tmp/mock-tubafrenzy.pid 2>/dev/null) 2>/dev/null || true

  # Single stable check for branch protection. With the matrix above, individual
  # shard jobs are named "E2E Tests (shard N/M)" — that name shifts if we ever
  # change the shard count. This aggregator stays "E2E Tests" so the required-
  # status-check rule doesn't need touching.
  #
  # `skipped` is treated as success because the e2e matrix is gated by the
  # `changes` job's path filter (issue #731). On a PR that doesn't touch app
  # source, the matrix skips and we should pass — not fail — so workflow-only
  # PRs can satisfy the required check.
  e2e-all:
    name: E2E Tests
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        run: |
          case "${{ needs.e2e.result }}" in
            success|skipped)
              echo "E2E matrix result: ${{ needs.e2e.result }}"
              ;;
            *)
              echo "One or more E2E shards failed: ${{ needs.e2e.result }}"
              exit 1
              ;;
          esac
