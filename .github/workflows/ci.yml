name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:8082/auth
  NEXT_PUBLIC_DASHBOARD_HOME_PAGE: /dashboard/flowsheet
  NEXT_PUBLIC_VERSION: ci
  NEXT_PUBLIC_DEFAULT_EXPERIENCE: modern
  NEXT_PUBLIC_ENABLED_EXPERIENCES: modern,classic
  NEXT_PUBLIC_ALLOW_EXPERIENCE_SWITCHING: "true"

# Workflow-level GITHUB_TOKEN scope. No job in this file pushes code,
# comments on PRs, or creates releases; all writes to external services
# use their own non-GITHUB_TOKEN secrets. contents:read is the safe floor.
permissions:
  contents: read

jobs:
  # Compute which path categories changed in this PR. Downstream jobs read
  # outputs from here so their `if:` guard can short-circuit before doing
  # any setup work, while still posting a (skipped) check status. This is
  # what lets branch protection require Type Check / Build / Unit Tests
  # without locking out workflow-only or docs-only PRs (see #731).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      app_source: ${{ steps.filter.outputs.app_source }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7

      - name: Filter
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            app_source:
              - 'app/**'
              - 'src/**'
              - 'lib/**'
              - 'tests/**'
              - 'public/**'
              - '*.ts'
              - '*.tsx'
              - '*.mts'
              - '*.json'
              - '*.config.*'
              - '.github/workflows/ci.yml'

  typecheck:
    name: Type Check
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.app_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests (${{ matrix.shard }})
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.app_source == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fetch base branch for change detection
        if: github.event_name == 'pull_request'
        run: git fetch origin main --depth=1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run unit tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx vitest run --changed origin/main --shard=${{ matrix.shard }}
          else
            npx vitest run --shard=${{ matrix.shard }}
          fi

  # Umbrella over the unit-test matrix. Branch protection cannot require the
  # per-shard names ("Unit Tests (1/3)" etc.) because when the matrix is
  # `if:`-gated off, GitHub posts a single status with the literal
  # `${{ matrix.shard }}` placeholder instead of expanding to one status per
  # shard. Required-status-checks then sees the expected names as missing and
  # blocks the PR forever. This umbrella posts a stable name ("Unit Tests")
  # regardless of whether the matrix expands, and accepts `skipped` as
  # success so workflow-only PRs can satisfy it.
  unit-tests:
    name: Unit Tests
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all shards passed
        run: |
          case "${{ needs.test.result }}" in
            success|skipped)
              echo "Unit test matrix result: ${{ needs.test.result }}"
              ;;
            *)
              echo "One or more unit-test shards failed: ${{ needs.test.result }}"
              exit 1
              ;;
          esac

  build:
    name: Build
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.app_source == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
