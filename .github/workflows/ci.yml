name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'src/**'
      - 'lib/**'
      - 'tests/**'
      - 'public/**'
      - '*.ts'
      - '*.tsx'
      - '*.mts'
      - '*.json'
      - '*.config.*'
      - '.github/workflows/ci.yml'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
  NEXT_PUBLIC_BETTER_AUTH_URL: http://localhost:8082/auth
  NEXT_PUBLIC_DASHBOARD_HOME_PAGE: /dashboard/flowsheet
  NEXT_PUBLIC_VERSION: ci
  NEXT_PUBLIC_DEFAULT_EXPERIENCE: modern
  NEXT_PUBLIC_ENABLED_EXPERIENCES: modern,classic
  NEXT_PUBLIC_ALLOW_EXPERIENCE_SWITCHING: "true"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Type check
        run: npx tsc --noEmit

  test:
    name: Unit Tests (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [1/3, 2/3, 3/3]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch base branch for change detection
        if: github.event_name == 'pull_request'
        run: git fetch origin main --depth=1

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Run unit tests
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx vitest run --changed origin/main --shard=${{ matrix.shard }}
          else
            npx vitest run --shard=${{ matrix.shard }}
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Build
        run: npm run build
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
