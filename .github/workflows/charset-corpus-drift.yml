name: Charset Corpus Drift

# Bump-or-freeze procedure: see WXYC/wxyc-shared README "Drift guard CI".

on:
  pull_request:
    paths:
      - "tests/fixtures/charset-torture.json.sha256"
      - ".github/workflows/charset-corpus-drift.yml"
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"

jobs:
  drift:
    uses: WXYC/wxyc-shared/.github/workflows/check-charset-corpus-drift.yml@main
    with:
      pinned-sha256: 41a18c5c0a92d129ec4b575827b6874196bfb7591e4bdf237a918a5da2de7b66
      package-version: "0.12.0"
    secrets:
      npm-token: ${{ secrets.GITHUB_TOKEN }}
