name: Charset Corpus Drift

# Bump-or-freeze procedure: see WXYC/wxyc-shared README "Drift guard CI".

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * 1"

# Workflow-level GITHUB_TOKEN scope. The reusable workflow runs
# `npm pack @wxyc/shared` against npm.pkg.github.com using the token
# forwarded as `npm-token`, which needs packages:read.
permissions:
  contents: read
  packages: read

jobs:
  # See ci.yml for the rationale on the changes-job pattern (issue #731).
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      corpus: ${{ steps.filter.outputs.corpus }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v7

      - name: Filter
        if: github.event_name == 'pull_request'
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            corpus:
              - 'tests/fixtures/charset-torture.json.sha256'
              - '.github/workflows/charset-corpus-drift.yml'

  drift:
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.corpus == 'true'
    uses: WXYC/wxyc-shared/.github/workflows/check-charset-corpus-drift.yml@gha/v1
    with:
      pinned-sha256: 41a18c5c0a92d129ec4b575827b6874196bfb7591e4bdf237a918a5da2de7b66
      package-version: "0.12.0"
      wxyc-shared-ref: gha/v1
    secrets:
      npm-token: ${{ secrets.GITHUB_TOKEN }}
