services:
  postgres:
    image: postgres:18.0-alpine
    environment:
      POSTGRES_PASSWORD: 'RadioIsEpic$1100'
      POSTGRES_USER: wxyc_admin
      POSTGRES_DB: wxyc_db
    ports:
      - "${E2E_DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "wxyc_admin", "-d", "wxyc_db"]
      interval: 5s
      timeout: 5s
      retries: 5
